<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AC Logger - Dengan Flash Wajib</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: #0d1117;
            padding: 16px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .header {
            background: linear-gradient(145deg, #1e3c72, #2a5298);
            padding: 30px 24px;
            border-radius: 30px 30px 0 0;
            color: white;
        }
        
        .flash-badge {
            background: #ffd700;
            color: #000;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0% { opacity: 1; background: #ffd700; }
            50% { opacity: 0.8; background: #ffaa00; box-shadow: 0 0 20px #ffd700; }
            100% { opacity: 1; background: #ffd700; }
        }
        
        .main-card {
            background: #1a2634;
            border-radius: 0 0 30px 30px;
            padding: 24px;
            margin-bottom: 20px;
        }
        
        .camera-box {
            background: #0f172a;
            border-radius: 24px;
            padding: 16px;
            border: 3px solid #ffd700;
            box-shadow: 0 0 20px #ffd70040;
        }
        
        .preview {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            min-height: 350px;
            position: relative;
        }
        
        .preview video, .preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .flash-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ffd700;
            color: #000;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            z-index: 10;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); box-shadow: 0 0 30px #ffd700; }
            100% { transform: scale(1); }
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        
        button {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .btn-camera {
            background: #2d3b4f;
            color: white;
        }
        
        .btn-capture {
            background: #ffd700;
            color: #000;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-capture:disabled {
            opacity: 0.5;
        }
        
        .result-box {
            background: linear-gradient(145deg, #1e3c72, #2a5298);
            border-radius: 20px;
            padding: 24px;
            margin-top: 20px;
            color: white;
        }
        
        .number-display {
            font-size: 64px;
            font-weight: 800;
            text-align: center;
            margin: 20px 0;
            text-shadow: 0 0 20px #ffd700;
        }
        
        .btn-save {
            background: #ffd700;
            color: #000;
            padding: 18px;
            width: 100%;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 800;
            margin-top: 10px;
        }
        
        .history-card {
            background: #1a2634;
            border-radius: 30px;
            padding: 24px;
        }
        
        .record {
            background: #0f172a;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #ffd700;
        }
        
        .record-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .room-tag {
            background: #ffd700;
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        .record-value {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
            margin: 8px 0;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1 style="display: flex; align-items: center; gap: 10px;">
                <span>🔦</span>
                AC Logger - FLASH OTOMATIS
            </h1>
            <div class="flash-badge">⚡ FLASH WAJIB NYALA ⚡</div>
        </div>
        
        <!-- MAIN CARD -->
        <div class="main-card">
            <!-- Pilih Ruangan -->
            <select id="roomSelect" style="width: 100%; padding: 16px; background: #0f172a; border: 2px solid #2d3b4f; border-radius: 16px; color: white; margin-bottom: 20px;">
                <option value="">-- Pilih Ruangan --</option>
                <option value="R.101">R.101 - Server Room</option>
                <option value="R.102">R.102 - Data Center</option>
                <option value="R.103">R.103 - Network Room</option>
            </select>
            
            <!-- Pilih Alat -->
            <select id="toolSelect" style="width: 100%; padding: 16px; background: #0f172a; border: 2px solid #2d3b4f; border-radius: 16px; color: white; margin-bottom: 20px;">
                <option value="">-- Pilih Alat --</option>
                <option value="Thermometer">🌡️ Thermometer</option>
                <option value="Hygrometer">💧 Hygrometer</option>
                <option value="AC Display">❄️ AC Display</option>
            </select>
            
            <!-- CAMERA BOX -->
            <div class="camera-box">
                <div class="preview" id="preview">
                    <div style="text-align: center; padding: 50px; color: #667788;">
                        <div style="font-size: 48px;">📷</div>
                        <div style="margin-top: 10px;">Klik BUKA KAMERA</div>
                    </div>
                    <div class="flash-indicator hidden" id="flashIndicator">🔦 FLASH ON</div>
                </div>
                
                <div class="button-group">
                    <button id="openCameraBtn" class="btn-camera">📷 BUKA</button>
                    <button id="captureBtn" class="btn-capture" disabled>
                        <span>⚡</span>
                        FOTO DENGAN FLASH
                        <span>⚡</span>
                    </button>
                    <button id="retakeBtn" class="btn-camera" style="display: none;">↺ ULANG</button>
                </div>
                
                <!-- Input Angka (Muncul setelah foto) -->
                <div id="inputSection" class="hidden" style="margin-top: 20px;">
                    <div style="color: white; text-align: center; margin-bottom: 10px;">
                        📝 Masukkan angka yang terlihat di foto:
                    </div>
                    <input type="text" id="numberInput" placeholder="Contoh: 24.5°C atau 65%" 
                        style="width: 100%; padding: 16px; background: #0f172a; border: 2px solid #ffd700; border-radius: 16px; color: white; font-size: 18px; text-align: center;">
                    <button id="saveBtn" class="btn-save">💾 SIMPAN DATA</button>
                </div>
            </div>
        </div>
        
        <!-- HISTORY CARD -->
        <div class="history-card">
            <h3 style="color: white; margin-bottom: 20px;">📋 RIWAYAT</h3>
            <div id="historyList"></div>
            <button id="clearBtn" style="background: #ef4444; color: white; border: none; padding: 14px; width: 100%; border-radius: 40px; margin-top: 16px;">
                HAPUS SEMUA
            </button>
        </div>
    </div>
    
    <script>
        // ==================== DATA ====================
        let records = JSON.parse(localStorage.getItem('flashRecords')) || [];
        let stream = null;
        let video = null;
        let canvas = document.createElement('canvas');
        let currentPhoto = null;
        
        // ==================== TAMPIL HISTORY ====================
        function showHistory() {
            const list = document.getElementById('historyList');
            
            if (records.length === 0) {
                list.innerHTML = '<div style="color: #667788; text-align: center; padding: 20px;">Belum ada data</div>';
                return;
            }
            
            list.innerHTML = records.map(r => `
                <div class="record">
                    <div class="record-header">
                        <span class="room-tag">${r.room}</span>
                        <span style="color: #8899aa;">${r.time}</span>
                    </div>
                    <div style="color: white;">${r.tool}</div>
                    <div class="record-value">${r.value}</div>
                </div>
            `).join('');
        }
        
        // ==================== BUKA KAMERA DENGAN FLASH ====================
        document.getElementById('openCameraBtn').addEventListener('click', async function() {
            try {
                // Minta akses kamera dengan flash
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'environment',
                        // Aktifkan torch (flash) kalau support
                        advanced: [{ torch: true }]
                    } 
                });
                
                // Cek apakah flash benar-benar nyala
                const track = stream.getVideoTracks()[0];
                const capabilities = track.getCapabilities();
                
                if (capabilities.torch) {
                    // Flash bisa dikontrol
                    await track.applyConstraints({ advanced: [{ torch: true }] });
                    document.getElementById('flashIndicator').classList.remove('hidden');
                } else {
                    // Flash tidak support, tapi tetep jalan
                    alert('⚠️ Perangkat tidak mendukung flash, tapi kamera tetap bisa digunakan');
                }
                
                video = document.createElement('video');
                video.srcObject = stream;
                video.autoplay = true;
                video.playsInline = true;
                
                const preview = document.getElementById('preview');
                preview.innerHTML = '';
                preview.appendChild(video);
                preview.appendChild(document.getElementById('flashIndicator'));
                
                document.getElementById('openCameraBtn').disabled = true;
                document.getElementById('captureBtn').disabled = false;
                document.getElementById('retakeBtn').style.display = 'none';
                document.getElementById('inputSection').classList.add('hidden');
                
            } catch (err) {
                alert('Gagal buka kamera: ' + err.message);
            }
        });
        
        // ==================== AMBIL FOTO ====================
        document.getElementById('captureBtn').addEventListener('click', function() {
            if (!video) return;
            
            // Pastikan flash masih nyala pas moto
            if (stream) {
                const track = stream.getVideoTracks()[0];
                if (track.getCapabilities().torch) {
                    track.applyConstraints({ advanced: [{ torch: true }] });
                }
            }
            
            // Capture foto
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            currentPhoto = canvas.toDataURL('image/jpeg', 0.9);
            
            // Tampilkan foto
            const preview = document.getElementById('preview');
            preview.innerHTML = `<img src="${currentPhoto}">`;
            preview.appendChild(document.getElementById('flashIndicator'));
            
            // Stop kamera
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
            
            // Update button
            document.getElementById('openCameraBtn').disabled = false;
            document.getElementById('captureBtn').disabled = true;
            document.getElementById('retakeBtn').style.display = 'block';
            document.getElementById('flashIndicator').classList.add('hidden');
            
            // Tampilkan input angka
            document.getElementById('inputSection').classList.remove('hidden');
            document.getElementById('numberInput').focus();
        });
        
        // ==================== FOTO ULANG ====================
        document.getElementById('retakeBtn').addEventListener('click', function() {
            document.getElementById('preview').innerHTML = `
                <div style="text-align: center; padding: 50px; color: #667788;">
                    <div style="font-size: 48px;">📷</div>
                    <div style="margin-top: 10px;">Klik BUKA KAMERA</div>
                </div>
            `;
            document.getElementById('preview').appendChild(document.getElementById('flashIndicator'));
            
            currentPhoto = null;
            document.getElementById('openCameraBtn').disabled = false;
            document.getElementById('captureBtn').disabled = true;
            document.getElementById('retakeBtn').style.display = 'none';
            document.getElementById('inputSection').classList.add('hidden');
            document.getElementById('numberInput').value = '';
        });
        
        // ==================== SIMPAN DATA ====================
        document.getElementById('saveBtn').addEventListener('click', function() {
            const room = document.getElementById('roomSelect').value;
            const tool = document.getElementById('toolSelect').value;
            const value = document.getElementById('numberInput').value.trim();
            
            if (!room) {
                alert('Pilih ruangan!');
                return;
            }
            
            if (!tool) {
                alert('Pilih alat!');
                return;
            }
            
            if (!value) {
                alert('Masukkan angka!');
                return;
            }
            
            const record = {
                room: room,
                tool: tool,
                value: value,
                photo: currentPhoto,
                time: new Date().toLocaleString('id-ID')
            };
            
            records.unshift(record);
            localStorage.setItem('flashRecords', JSON.stringify(records));
            
            showHistory();
            
            // Reset
            document.getElementById('roomSelect').value = '';
            document.getElementById('toolSelect').value = '';
            document.getElementById('numberInput').value = '';
            document.getElementById('retakeBtn').click();
            
            alert('✅ Data tersimpan!');
        });
        
        // ==================== HAPUS SEMUA ====================
        document.getElementById('clearBtn').addEventListener('click', function() {
            if (confirm('Hapus semua riwayat?')) {
                records = [];
                localStorage.removeItem('flashRecords');
                showHistory();
            }
        });
        
        // Initial history
        showHistory();
    </script>
</body>
</html>
