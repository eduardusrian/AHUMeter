<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AC Logger - Auto OCR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 25px;
            border-radius: 15px 15px 0 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header h1 {
            color: #333;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .main-card {
            background: white;
            padding: 30px;
            border-radius: 0 0 15px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }

        .camera-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            color: white;
        }

        .preview-window {
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 15px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid white;
        }

        .preview-window video, .preview-window img {
            max-width: 100%;
            max-height: 350px;
        }

        .placeholder {
            text-align: center;
            color: #999;
            padding: 40px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            min-width: 120px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-white {
            background: white;
            color: #667eea;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .result-box {
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .result-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 48px;
            font-weight: bold;
            line-height: 1.2;
            margin: 10px 0;
        }

        .confirm-btn {
            background: white;
            color: #28a745;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }

        .loading {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .records-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .record-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .record-photo {
            max-width: 150px;
            margin-top: 10px;
            border-radius: 8px;
            overflow: hidden;
        }

        .record-photo img {
            width: 100%;
            height: auto;
        }

        .hidden {
            display: none;
        }
    </style>
    <!-- Pake Tesseract CDN yang lebih stabil -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <span>📸</span>
                AC Logger - Auto Read from Photo
            </h1>
        </div>

        <div class="main-card">
            <div class="form-group">
                <label>📍 Pilih Ruangan</label>
                <select id="roomSelect" required>
                    <option value="">-- Pilih Ruangan --</option>
                    <option value="R.101">R.101 - Server Room</option>
                    <option value="R.102">R.102 - Data Center</option>
                    <option value="R.103">R.103 - Network Room</option>
                    <option value="R.104">R.104 - Storage</option>
                </select>
            </div>

            <div class="form-group">
                <label>📊 Jenis Alat</label>
                <select id="toolSelect" required>
                    <option value="">-- Pilih Alat --</option>
                    <option value="Thermometer">🌡️ Thermometer</option>
                    <option value="Hygrometer">💧 Hygrometer</option>
                    <option value="AC Display">❄️ AC Display</option>
                </select>
            </div>

            <!-- Camera Card -->
            <div class="camera-card">
                <div class="preview-window" id="previewWindow">
                    <div class="placeholder">
                        <div style="font-size: 48px;">📷</div>
                        <p>Klik "Buka Kamera" untuk mulai</p>
                    </div>
                </div>

                <div class="button-group">
                    <button id="openCamera" class="btn btn-white">📷 Buka Kamera</button>
                    <button id="takePhoto" class="btn btn-success" disabled>📸 Ambil Foto</button>
                    <button id="retakePhoto" class="btn btn-danger" style="display: none;">↺ Foto Ulang</button>
                </div>

                <!-- Hasil OCR -->
                <div id="ocrResult" class="result-box hidden">
                    <div class="result-label">Nilai Terdeteksi:</div>
                    <div class="result-value" id="detectedNumber">-</div>
                    <button id="confirmNumber" class="confirm-btn">✅ KONFIRMASI & SIMPAN</button>
                </div>

                <!-- Loading -->
                <div id="loadingOCR" class="result-box hidden" style="text-align: center;">
                    <div class="loading"></div>
                    <p style="margin-top: 10px;">Membaca angka dari foto...</p>
                </div>
            </div>

            <!-- Hidden input buat nyimpen data -->
            <input type="hidden" id="photoData">
            <input type="hidden" id="ocrData">
        </div>

        <!-- Riwayat -->
        <div class="records-section">
            <h2 style="margin-bottom: 20px;">📋 Riwayat Pencatatan</h2>
            <div id="recordsContainer"></div>
            <button id="clearHistory" class="btn btn-danger" style="width: 100%; margin-top: 15px;">Hapus Semua</button>
        </div>
    </div>

    <script>
        // Data storage
        let records = JSON.parse(localStorage.getItem('acRecords')) || [];
        
        // Camera variables
        let stream = null;
        let video = null;
        let canvas = document.createElement('canvas');
        let currentPhoto = null;
        let currentOcrResult = '';

        // DOM elements
        const previewWindow = document.getElementById('previewWindow');
        const openCamera = document.getElementById('openCamera');
        const takePhoto = document.getElementById('takePhoto');
        const retakePhoto = document.getElementById('retakePhoto');
        const ocrResult = document.getElementById('ocrResult');
        const loadingOCR = document.getElementById('loadingOCR');
        const detectedNumber = document.getElementById('detectedNumber');
        const confirmNumber = document.getElementById('confirmNumber');
        const photoData = document.getElementById('photoData');
        const ocrData = document.getElementById('ocrData');
        const roomSelect = document.getElementById('roomSelect');
        const toolSelect = document.getElementById('toolSelect');

        // Tampilkan records
        function displayRecords() {
            const container = document.getElementById('recordsContainer');
            
            if (records.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 30px; color: #888;">Belum ada data</div>';
                return;
            }

            container.innerHTML = records.map(record => `
                <div class="record-item">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <span style="background: #667eea; color: white; padding: 5px 12px; border-radius: 20px;">${record.room}</span>
                        <span style="color: #888; font-size: 12px;">${record.time}</span>
                    </div>
                    <p><strong>Alat:</strong> ${record.tool}</p>
                    <p><strong>Nilai:</strong> <span style="background: #e8f5e8; padding: 3px 8px; border-radius: 5px; font-weight: bold;">${record.value}</span></p>
                    ${record.photo ? `
                        <div class="record-photo">
                            <img src="${record.photo}" alt="Foto">
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // Buka kamera
        openCamera.addEventListener('click', async function() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                });
                
                video = document.createElement('video');
                video.srcObject = stream;
                video.autoplay = true;
                video.playsInline = true;
                
                previewWindow.innerHTML = '';
                previewWindow.appendChild(video);
                
                openCamera.disabled = true;
                takePhoto.disabled = false;
                retakePhoto.style.display = 'none';
                
            } catch (err) {
                alert('Gagal buka kamera: ' + err.message);
            }
        });

        // Ambil foto
        takePhoto.addEventListener('click', function() {
            if (!video) return;
            
            // Set canvas size
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            
            // Capture frame
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Simpan foto
            currentPhoto = canvas.toDataURL('image/jpeg', 0.9);
            
            // Tampilkan foto
            previewWindow.innerHTML = `<img src="${currentPhoto}" alt="Foto">`;
            
            // Stop kamera
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            
            // Update buttons
            openCamera.disabled = false;
            takePhoto.disabled = true;
            retakePhoto.style.display = 'block';
            
            // Proses OCR
            processOCR(currentPhoto);
        });

        // Foto ulang
        retakePhoto.addEventListener('click', function() {
            previewWindow.innerHTML = `
                <div class="placeholder">
                    <div style="font-size: 48px;">📷</div>
                    <p>Klik "Buka Kamera" untuk mulai</p>
                </div>
            `;
            
            currentPhoto = null;
            currentOcrResult = '';
            ocrResult.classList.add('hidden');
            loadingOCR.classList.add('hidden');
            photoData.value = '';
            ocrData.value = '';
            
            openCamera.disabled = false;
            takePhoto.disabled = true;
            retakePhoto.style.display = 'none';
        });

        // Fungsi OCR
        async function processOCR(imageData) {
            // Tampilkan loading
            loadingOCR.classList.remove('hidden');
            ocrResult.classList.add('hidden');
            
            try {
                // Pake Tesseract
                const { createWorker } = Tesseract;
                const worker = await createWorker('eng');
                
                // Set karakter yang mau dideteksi (angka dan simbol suhu)
                await worker.setParameters({
                    tessedit_char_whitelist: '0123456789.,°C%'
                });
                
                // Proses
                const { data: { text } } = await worker.recognize(imageData);
                await worker.terminate();
                
                // Extract angka (cari pola seperti 24.5°C atau 65%)
                const matches = text.match(/\d+[.,]?\d*\s*°?C?|\d+[.,]?\d*\s*%?/g);
                const result = matches ? matches[0] : 'Tidak terbaca';
                
                // Sembunyikan loading
                loadingOCR.classList.add('hidden');
                
                if (result !== 'Tidak terbaca') {
                    // Tampilkan hasil
                    detectedNumber.textContent = result;
                    ocrResult.classList.remove('hidden');
                    
                    // Simpan data
                    currentOcrResult = result;
                    photoData.value = imageData;
                    ocrData.value = result;
                } else {
                    alert('❌ Tidak bisa membaca angka. Silakan foto ulang!');
                }
                
            } catch (error) {
                console.error('OCR Error:', error);
                loadingOCR.classList.add('hidden');
                alert('Gagal memproses foto. Coba lagi!');
            }
        }

        // Konfirmasi dan simpan
        confirmNumber.addEventListener('click', function() {
            // Validasi
            if (!roomSelect.value) {
                alert('Pilih ruangan dulu!');
                return;
            }
            
            if (!toolSelect.value) {
                alert('Pilih jenis alat dulu!');
                return;
            }
            
            if (!currentOcrResult) {
                alert('Tidak ada hasil OCR!');
                return;
            }
            
            // Buat record
            const record = {
                id: Date.now(),
                room: roomSelect.value,
                tool: toolSelect.value,
                value: currentOcrResult,
                photo: currentPhoto,
                time: new Date().toLocaleString('id-ID')
            };
            
            // Simpan
            records.unshift(record);
            localStorage.setItem('acRecords', JSON.stringify(records));
            
            // Update tampilan
            displayRecords();
            
            // Reset
            roomSelect.value = '';
            toolSelect.value = '';
            retakePhoto.click();
            
            alert('✅ Data berhasil disimpan!');
        });

        // Hapus semua
        document.getElementById('clearHistory').addEventListener('click', function() {
            if (confirm('Hapus semua riwayat?')) {
                records = [];
                localStorage.removeItem('acRecords');
                displayRecords();
            }
        });

        // Initial display
        displayRecords();
    </script>
</body>
</html>
