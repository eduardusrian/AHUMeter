<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AC Logger - With Blur Detection & Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 25px;
            border-radius: 15px 15px 0 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .main-card {
            background: white;
            padding: 30px;
            border-radius: 0 0 15px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .camera-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px dashed #667eea;
        }

        .camera-preview {
            width: 100%;
            min-height: 300px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .camera-preview img, .camera-preview video {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
        }

        .camera-placeholder {
            text-align: center;
            color: #888;
            padding: 40px;
        }

        .camera-placeholder i {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
        }

        .camera-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
            flex: 1;
            min-width: 120px;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-danger {
            background: #dc3545;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .quality-badge {
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 10px;
        }

        .quality-good {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .quality-bad {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .detection-result {
            background: #e3f2fd;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            border-left: 4px solid #2196f3;
        }

        .detection-result h3 {
            color: #1976d2;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .detected-value-box {
            background: white;
            border: 2px solid #2196f3;
            border-radius: 8px;
            padding: 15px;
            font-size: 24px;
            font-weight: bold;
            color: #1976d2;
            text-align: center;
            margin: 10px 0;
        }

        .confirmation-box {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }

        .confirmation-box p {
            margin-bottom: 15px;
            font-size: 16px;
            color: #856404;
        }

        .confirmation-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .records-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .record-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .room-badge {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .record-time {
            color: #888;
            font-size: 12px;
        }

        .record-photo {
            max-width: 150px;
            margin-top: 10px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #e0e0e0;
        }

        .hidden {
            display: none;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #667eea;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <!-- Tesseract.js untuk OCR -->
    <script src='https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js'></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i>📸</i>
                Smart AC Logger - Preview & Konfirmasi
            </h1>
        </div>

        <div class="main-card">
            <form id="airQualityForm">
                <div class="form-group">
                    <label for="roomNumber">Nomor Ruangan</label>
                    <select id="roomNumber" required>
                        <option value="">Pilih Ruangan</option>
                        <option value="R.101">R.101 - Server Room</option>
                        <option value="R.102">R.102 - Data Center</option>
                        <option value="R.103">R.103 - Network Room</option>
                        <option value="R.104">R.104 - Storage</option>
                        <option value="R.105">R.105 - Control Room</option>
                        <option value="R.201">R.201 - Office A</option>
                        <option value="R.202">R.202 - Office B</option>
                        <option value="R.203">R.203 - Meeting Room</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="itemName">Jenis Alat</label>
                    <select id="itemName" required>
                        <option value="">Pilih Jenis Alat</option>
                        <option value="Thermometer">🌡️ Thermometer (Suhu)</option>
                        <option value="Hygrometer">💧 Hygrometer (Kelembaban)</option>
                        <option value="Thermohygrometer">📊 Thermohygrometer (Suhu + RH)</option>
                        <option value="AC Display">❄️ AC Display</option>
                        <option value="Air Flow Meter">💨 Air Flow Meter</option>
                    </select>
                </div>

                <!-- Camera Section -->
                <div class="camera-section">
                    <div class="camera-preview" id="cameraPreview">
                        <div class="camera-placeholder">
                            <i>📷</i>
                            <p>Belum ada foto</p>
                            <p style="font-size: 12px;">Klik "Buka Kamera" untuk memulai</p>
                        </div>
                    </div>

                    <div class="camera-controls">
                        <button type="button" id="startCamera" class="btn">📷 Buka Kamera</button>
                        <button type="button" id="capturePhoto" class="btn btn-success" disabled>📸 Ambil Foto</button>
                        <button type="button" id="retakePhoto" class="btn btn-secondary" style="display: none;">🔄 Foto Ulang</button>
                    </div>

                    <!-- Quality Badge -->
                    <div id="qualityBadge" class="quality-badge hidden"></div>

                    <!-- Loading Indicator -->
                    <div id="loadingOcr" class="hidden" style="text-align: center; margin: 15px 0;">
                        <div class="loader"></div>
                        <p style="color: #667eea;">Membaca angka dari foto...</p>
                    </div>

                    <!-- Detection Result -->
                    <div id="detectionResult" class="detection-result hidden">
                        <h3>📊 Hasil Deteksi Otomatis:</h3>
                        <div id="detectedValue" class="detected-value-box">-</div>
                        <p style="font-size: 12px; color: #666; margin-top: 5px;">*Pastikan angka yang terbaca sudah benar</p>
                    </div>

                    <!-- Confirmation Box -->
                    <div id="confirmationBox" class="confirmation-box hidden">
                        <p>✅ Apakah angka yang terdeteksi sudah sesuai dengan yang tertera di alat?</p>
                        <div class="confirmation-buttons">
                            <button type="button" id="confirmYes" class="btn btn-success">Ya, Sesuai</button>
                            <button type="button" id="confirmNo" class="btn btn-danger">Tidak, Foto Ulang</button>
                        </div>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn" disabled>Submit Pencatatan</button>
            </form>
        </div>

        <div class="records-section">
            <h2>📋 Riwayat Pencatatan</h2>
            <div id="recordsList"></div>
            <button id="clearAll" class="btn btn-danger" style="margin-top: 15px;">Hapus Semua Riwayat</button>
        </div>
    </div>

    <script>
        // Load records from localStorage
        let records = JSON.parse(localStorage.getItem('airQualityRecords')) || [];
        
        // Global variables
        let videoStream = null;
        let videoElement = null;
        let canvas = document.createElement('canvas');
        let currentPhotoData = null;
        let detectedText = '';
        let isPhotoAccepted = false;

        // Initialize camera
        document.getElementById('startCamera').addEventListener('click', async function() {
            const preview = document.getElementById('cameraPreview');
            
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    } 
                });
                
                videoElement = document.createElement('video');
                videoElement.srcObject = videoStream;
                videoElement.autoplay = true;
                videoElement.playsInline = true;
                
                preview.innerHTML = '';
                preview.appendChild(videoElement);
                
                document.getElementById('startCamera').disabled = true;
                document.getElementById('capturePhoto').disabled = false;
                document.getElementById('retakePhoto').style.display = 'none';
                
            } catch (error) {
                alert('Gagal mengakses kamera. Pastikan izin kamera diberikan.');
                console.error(error);
            }
        });

        // Capture photo
        document.getElementById('capturePhoto').addEventListener('click', function() {
            if (!videoElement) return;
            
            canvas.width = videoElement.videoWidth;
            canvas.height = videoElement.videoHeight;
            
            canvas.getContext('2d').drawImage(videoElement, 0, 0, canvas.width, canvas.height);
            
            // Konversi ke data URL
            currentPhotoData = canvas.toDataURL('image/jpeg', 0.9);
            
            // Tampilkan preview foto
            const preview = document.getElementById('cameraPreview');
            preview.innerHTML = `<img src="${currentPhotoData}" alt="Captured Photo">`;
            
            // Stop video stream
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
            
            // Update buttons
            document.getElementById('startCamera').disabled = false;
            document.getElementById('capturePhoto').disabled = true;
            document.getElementById('retakePhoto').style.display = 'block';
            
            // Cek kualitas foto (blur detection sederhana)
            checkImageQuality(currentPhotoData);
        });

        // Retake photo
        document.getElementById('retakePhoto').addEventListener('click', function() {
            // Reset semua
            const preview = document.getElementById('cameraPreview');
            preview.innerHTML = `
                <div class="camera-placeholder">
                    <i>📷</i>
                    <p>Klik "Buka Kamera" untuk foto ulang</p>
                </div>
            `;
            
            // Hide all result elements
            document.getElementById('qualityBadge').classList.add('hidden');
            document.getElementById('loadingOcr').classList.add('hidden');
            document.getElementById('detectionResult').classList.add('hidden');
            document.getElementById('confirmationBox').classList.add('hidden');
            document.getElementById('submitBtn').disabled = true;
            
            // Reset buttons
            document.getElementById('startCamera').disabled = false;
            document.getElementById('capturePhoto').disabled = true;
            document.getElementById('retakePhoto').style.display = 'none';
            
            // Reset variables
            currentPhotoData = null;
            detectedText = '';
            isPhotoAccepted = false;
        });

        // Function to check image quality (sederhana)
        function checkImageQuality(imageData) {
            const img = new Image();
            img.onload = function() {
                // Buat canvas untuk analisis
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                
                // Ambil pixel data
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                
                // Hitung variance sederhana untuk deteksi blur
                let totalDiff = 0;
                let samples = 0;
                
                for (let y = 0; y < canvas.height - 1; y += 10) {
                    for (let x = 0; x < canvas.width - 1; x += 10) {
                        const i = (y * canvas.width + x) * 4;
                        const i2 = ((y + 1) * canvas.width + (x + 1)) * 4;
                        
                        const diff = Math.abs(data[i] - data[i2]) + 
                                    Math.abs(data[i+1] - data[i2+1]) + 
                                    Math.abs(data[i+2] - data[i2+2]);
                        
                        totalDiff += diff;
                        samples++;
                    }
                }
                
                const avgDiff = totalDiff / samples / 3; // Rata-rata per channel
                
                const qualityBadge = document.getElementById('qualityBadge');
                
                if (avgDiff < 15) { // Threshold blur
                    qualityBadge.className = 'quality-badge quality-bad';
                    qualityBadge.innerHTML = '❌ Foto blur! Harap foto ulang dengan lebih jelas';
                    qualityBadge.classList.remove('hidden');
                    
                    // Reset proses
                    document.getElementById('retakePhoto').click();
                } else {
                    qualityBadge.className = 'quality-badge quality-good';
                    qualityBadge.innerHTML = '✅ Kualitas foto bagus, memproses...';
                    qualityBadge.classList.remove('hidden');
                    
                    // Lanjut ke OCR
                    processOCR(currentPhotoData);
                }
            };
            img.src = imageData;
        }

        // OCR Processing
        async function processOCR(imageData) {
            document.getElementById('loadingOcr').classList.remove('hidden');
            document.getElementById('detectionResult').classList.add('hidden');
            document.getElementById('confirmationBox').classList.add('hidden');
            
            try {
                const { createWorker } = Tesseract;
                const worker = await createWorker('eng');
                
                await worker.setParameters({
                    tessedit_char_whitelist: '0123456789.,°C%RH',
                });
                
                const { data: { text } } = await worker.recognize(imageData);
                await worker.terminate();
                
                // Extract angka
                const numbers = text.match(/\d+[.,]?\d*°?C?|\d+[.,]?\d*%?RH?/g) || [];
                detectedText = numbers.join(' ').trim() || 'Tidak ada angka terdeteksi';
                
                document.getElementById('loadingOcr').classList.add('hidden');
                
                if (detectedText !== 'Tidak ada angka terdeteksi') {
                    document.getElementById('detectedValue').textContent = detectedText;
                    document.getElementById('detectionResult').classList.remove('hidden');
                    document.getElementById('confirmationBox').classList.remove('hidden');
                } else {
                    alert('Tidak ada angka yang terdeteksi. Silakan foto ulang dengan lebih jelas.');
                    document.getElementById('retakePhoto').click();
                }
                
            } catch (error) {
                console.error('OCR Error:', error);
                document.getElementById('loadingOcr').classList.add('hidden');
                alert('Gagal memproses foto. Silakan coba lagi.');
                document.getElementById('retakePhoto').click();
            }
        }

        // Konfirmasi hasil
        document.getElementById('confirmYes').addEventListener('click', function() {
            isPhotoAccepted = true;
            document.getElementById('confirmationBox').classList.add('hidden');
            document.getElementById('submitBtn').disabled = false;
            alert('✅ Data siap disubmit!');
        });

        document.getElementById('confirmNo').addEventListener('click', function() {
            alert('Silakan foto ulang dengan lebih jelas.');
            document.getElementById('retakePhoto').click();
        });

        // Form submission
        document.getElementById('airQualityForm').addEventListener('submit', function(e) {
            e.preventDefault();

            if (!isPhotoAccepted) {
                alert('Harap konfirmasi hasil deteksi terlebih dahulu!');
                return;
            }

            const roomNumber = document.getElementById('roomNumber').value;
            const itemName = document.getElementById('itemName').value;

            const record = {
                id: Date.now(),
                roomNumber: roomNumber,
                itemName: itemName,
                detectedValue: detectedText,
                photo: currentPhotoData,
                timestamp: new Date().toLocaleString('id-ID')
            };

            records.unshift(record);
            localStorage.setItem('airQualityRecords', JSON.stringify(records));
            
            displayRecords();
            resetForm();
            
            alert('✅ Data berhasil disimpan!');
        });

        // Display records
        function displayRecords() {
            const recordsList = document.getElementById('recordsList');
            
            if (records.length === 0) {
                recordsList.innerHTML = '<div class="no-records" style="text-align: center; padding: 30px; color: #888;">Belum ada data pencatatan</div>';
                return;
            }

            recordsList.innerHTML = records.map(record => `
                <div class="record-item">
                    <div class="record-header">
                        <span class="room-badge">${record.roomNumber}</span>
                        <span class="record-time">${record.timestamp}</span>
                    </div>
                    <p><strong>Alat:</strong> ${record.itemName}</p>
                    <p><strong>Nilai Terbaca:</strong> <span style="background: #e8f5e8; padding: 3px 8px; border-radius: 5px; color: #2e7d32; font-weight: 600;">${record.detectedValue}</span></p>
                    <div class="record-photo">
                        <img src="${record.photo}" alt="Foto alat ukur">
                    </div>
                </div>
            `).join('');
        }

        // Reset form
        function resetForm() {
            document.getElementById('airQualityForm').reset();
            document.getElementById('retakePhoto').click(); // Trigger retake untuk reset tampilan
            document.getElementById('submitBtn').disabled = true;
            isPhotoAccepted = false;
            detectedText = '';
        }

        // Clear all records
        document.getElementById('clearAll').addEventListener('click', function() {
            if (confirm('Yakin ingin menghapus semua riwayat?')) {
                records = [];
                localStorage.removeItem('airQualityRecords');
                displayRecords();
            }
        });

        // Initial display
        displayRecords();
    </script>
</body>
</html>
