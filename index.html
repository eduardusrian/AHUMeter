<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AC Logger - FIXED Version</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 25px;
            border-radius: 15px 15px 0 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .main-card {
            background: white;
            padding: 30px;
            border-radius: 0 0 15px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .camera-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #667eea;
        }

        .preview-container {
            width: 100%;
            min-height: 300px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-container video, .preview-container img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
        }

        .placeholder-text {
            text-align: center;
            color: #888;
            padding: 40px;
        }

        .placeholder-text i {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
        }

        .camera-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
            flex: 1;
            min-width: 120px;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-danger {
            background: #dc3545;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-badge {
            padding: 10px 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-weight: 500;
        }

        .status-processing {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .detection-box {
            background: #e3f2fd;
            border-radius: 10px;
            padding: 20px;
            margin: 15px 0;
            border-left: 4px solid #2196f3;
        }

        .detection-value {
            background: white;
            border: 2px solid #2196f3;
            border-radius: 8px;
            padding: 15px;
            font-size: 28px;
            font-weight: bold;
            color: #1976d2;
            text-align: center;
            margin: 15px 0;
        }

        .confirmation-box {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 10px;
            padding: 20px;
            margin: 15px 0;
            text-align: center;
        }

        .confirmation-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        .record-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .room-badge {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
        }

        .record-photo {
            max-width: 150px;
            margin-top: 10px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #e0e0e0;
        }

        .record-photo img {
            width: 100%;
            height: auto;
        }

        .hidden {
            display: none;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #667eea;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script src="https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i>📸</i>
                Smart AC Logger - FIXED Version
            </h1>
        </div>

        <div class="main-card">
            <form id="airQualityForm">
                <!-- Pilih Ruangan -->
                <div class="form-group">
                    <label>📍 Nomor Ruangan</label>
                    <select id="roomNumber" required>
                        <option value="">Pilih Ruangan</option>
                        <option value="R.101">R.101 - Server Room</option>
                        <option value="R.102">R.102 - Data Center</option>
                        <option value="R.103">R.103 - Network Room</option>
                    </select>
                </div>

                <!-- Jenis Alat -->
                <div class="form-group">
                    <label>📊 Jenis Alat</label>
                    <select id="itemName" required>
                        <option value="">Pilih Jenis Alat</option>
                        <option value="Thermometer">🌡️ Thermometer (Suhu)</option>
                        <option value="Hygrometer">💧 Hygrometer (Kelembaban)</option>
                        <option value="AC Display">❄️ AC Display</option>
                    </select>
                </div>

                <!-- CAMERA SECTION -->
                <div class="camera-section">
                    <div class="preview-container" id="previewContainer">
                        <div class="placeholder-text">
                            <i>📷</i>
                            <p>Klik "Buka Kamera" untuk memulai</p>
                        </div>
                    </div>

                    <div class="camera-controls">
                        <button type="button" id="btnStartCamera" class="btn">📷 Buka Kamera</button>
                        <button type="button" id="btnCapture" class="btn btn-success" disabled>📸 Ambil Foto</button>
                        <button type="button" id="btnRetake" class="btn btn-secondary" style="display: none;">🔄 Foto Ulang</button>
                    </div>

                    <!-- Status Messages -->
                    <div id="statusMessage" class="status-badge hidden"></div>

                    <!-- Loading -->
                    <div id="loadingIndicator" class="hidden">
                        <div class="loader"></div>
                        <p style="text-align: center; color: #667eea;">Memproses foto...</p>
                    </div>

                    <!-- Detection Result -->
                    <div id="detectionBox" class="detection-box hidden">
                        <h3 style="margin-bottom: 10px;">📊 Hasil Deteksi:</h3>
                        <div id="detectedValue" class="detection-value">-</div>
                        <p style="font-size: 12px; color: #666;">Pastikan angka sudah sesuai</p>
                    </div>

                    <!-- Confirmation Box -->
                    <div id="confirmationBox" class="confirmation-box hidden">
                        <p style="font-weight: 600; margin-bottom: 10px;">✅ Apakah angka sudah benar?</p>
                        <div class="confirmation-buttons">
                            <button type="button" id="btnConfirmYes" class="btn btn-success">Ya, Benar</button>
                            <button type="button" id="btnConfirmNo" class="btn btn-danger">Tidak, Foto Ulang</button>
                        </div>
                    </div>
                </div>

                <!-- Hidden field untuk menyimpan photo data -->
                <input type="hidden" id="photoData" value="">
                <input type="hidden" id="ocrResult" value="">

                <button type="submit" id="submitBtn" class="btn" disabled>✅ SUBMIT PENCATATAN</button>
            </form>
        </div>

        <!-- Riwayat Records -->
        <div class="records-section">
            <h2>📋 Riwayat Pencatatan</h2>
            <div id="recordsList"></div>
            <button id="clearAll" class="btn btn-danger" style="margin-top: 15px; width: 100%;">Hapus Semua Riwayat</button>
        </div>
    </div>

    <script>
        // ==================== VARIABLES ====================
        let records = JSON.parse(localStorage.getItem('airQualityRecords')) || [];
        let videoStream = null;
        let videoElement = null;
        let canvas = document.createElement('canvas');
        let capturedPhoto = null;  // Untuk nyimpen foto yang udah diambil
        let detectedNumbers = '';  // Untuk nyimpen hasil OCR
        let isConfirmed = false;    // Status konfirmasi

        // ==================== DOM ELEMENTS ====================
        const previewContainer = document.getElementById('previewContainer');
        const btnStartCamera = document.getElementById('btnStartCamera');
        const btnCapture = document.getElementById('btnCapture');
        const btnRetake = document.getElementById('btnRetake');
        const statusMessage = document.getElementById('statusMessage');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const detectionBox = document.getElementById('detectionBox');
        const detectedValue = document.getElementById('detectedValue');
        const confirmationBox = document.getElementById('confirmationBox');
        const photoData = document.getElementById('photoData');
        const ocrResult = document.getElementById('ocrResult');
        const submitBtn = document.getElementById('submitBtn');

        // ==================== FUNGSI DISPLAY RECORDS ====================
        function displayRecords() {
            const recordsList = document.getElementById('recordsList');
            
            if (records.length === 0) {
                recordsList.innerHTML = '<div style="text-align: center; padding: 30px; color: #888;">Belum ada data pencatatan</div>';
                return;
            }

            recordsList.innerHTML = records.map(record => `
                <div class="record-item">
                    <div class="record-header">
                        <span class="room-badge">${record.roomNumber}</span>
                        <span style="color: #888; font-size: 12px;">${record.timestamp}</span>
                    </div>
                    <p><strong>Alat:</strong> ${record.itemName}</p>
                    <p><strong>Nilai:</strong> <span style="background: #e8f5e8; padding: 3px 8px; border-radius: 5px; color: #2e7d32;">${record.detectedValue}</span></p>
                    <div class="record-photo">
                        <img src="${record.photo}" alt="Foto">
                    </div>
                </div>
            `).join('');
        }

        // ==================== FUNGSI START CAMERA ====================
        btnStartCamera.addEventListener('click', async function() {
            try {
                // Minta akses kamera belakang
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'environment', // Kamera belakang
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                });
                
                // Buat elemen video
                videoElement = document.createElement('video');
                videoElement.srcObject = videoStream;
                videoElement.autoplay = true;
                videoElement.playsInline = true;
                
                // Tampilkan video di container
                previewContainer.innerHTML = '';
                previewContainer.appendChild(videoElement);
                
                // Update button status
                btnStartCamera.disabled = true;
                btnCapture.disabled = false;
                btnRetake.style.display = 'none';
                
                // Sembunyikan elemen lain
                statusMessage.classList.add('hidden');
                detectionBox.classList.add('hidden');
                confirmationBox.classList.add('hidden');
                
            } catch (error) {
                alert('Gagal akses kamera. Pastikan izin diberikan!');
                console.error(error);
            }
        });

        // ==================== FUNGSI CAPTURE FOTO ====================
        btnCapture.addEventListener('click', function() {
            if (!videoElement) return;
            
            // Set ukuran canvas sesuai video
            canvas.width = videoElement.videoWidth;
            canvas.height = videoElement.videoHeight;
            
            // Gambar frame video ke canvas
            canvas.getContext('2d').drawImage(videoElement, 0, 0, canvas.width, canvas.height);
            
            // Konversi ke data URL (INI YANG DISIMPEN)
            capturedPhoto = canvas.toDataURL('image/jpeg', 0.9);
            
            // Tampilkan foto yang udah diambil
            previewContainer.innerHTML = `<img src="${capturedPhoto}" alt="Captured Photo" style="max-width: 100%;">`;
            
            // Stop kamera (hemat baterai)
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
            
            // Update buttons
            btnStartCamera.disabled = false;
            btnCapture.disabled = true;
            btnRetake.style.display = 'block';
            
            // Tampilkan loading
            loadingIndicator.classList.remove('hidden');
            statusMessage.classList.add('hidden');
            
            // Proses OCR dengan delay biar keliatan loading
            setTimeout(() => {
                processOCR(capturedPhoto);
            }, 1500);
        });

        // ==================== FUNGSI RETAKE FOTO ====================
        btnRetake.addEventListener('click', function() {
            // Reset semua
            previewContainer.innerHTML = `
                <div class="placeholder-text">
                    <i>📷</i>
                    <p>Klik "Buka Kamera" untuk foto ulang</p>
                </div>
            `;
            
            // Reset variables
            capturedPhoto = null;
            detectedNumbers = '';
            isConfirmed = false;
            
            // Reset UI
            btnStartCamera.disabled = false;
            btnCapture.disabled = true;
            btnRetake.style.display = 'none';
            statusMessage.classList.add('hidden');
            loadingIndicator.classList.add('hidden');
            detectionBox.classList.add('hidden');
            confirmationBox.classList.add('hidden');
            submitBtn.disabled = true;
            
            // Kosongkan hidden field
            photoData.value = '';
            ocrResult.value = '';
        });

        // ==================== FUNGSI OCR ====================
        async function processOCR(imageData) {
            try {
                const { createWorker } = Tesseract;
                const worker = await createWorker('eng');
                
                // Setting biar fokus ke angka
                await worker.setParameters({
                    tessedit_char_whitelist: '0123456789.,°C%RH',
                });
                
                // Proses OCR
                const { data: { text } } = await worker.recognize(imageData);
                await worker.terminate();
                
                // Extract angka dari text
                const matches = text.match(/\d+[.,]?\d*\s*°?C?|\d+[.,]?\d*\s*%?RH?/gi);
                detectedNumbers = matches ? matches.join(' ') : 'Tidak terdeteksi';
                
                // Sembunyikan loading
                loadingIndicator.classList.add('hidden');
                
                if (detectedNumbers !== 'Tidak terdeteksi') {
                    // Tampilkan hasil deteksi
                    detectedValue.textContent = detectedNumbers;
                    detectionBox.classList.remove('hidden');
                    
                    // Tampilkan konfirmasi
                    confirmationBox.classList.remove('hidden');
                    
                    // Simpan di hidden field
                    photoData.value = imageData;
                    ocrResult.value = detectedNumbers;
                    
                    // Kasih pesan sukses
                    statusMessage.className = 'status-badge status-success';
                    statusMessage.innerHTML = '✅ Foto berhasil diproses! Periksa hasil deteksi.';
                    statusMessage.classList.remove('hidden');
                    
                } else {
                    // Gagal deteksi
                    statusMessage.className = 'status-badge status-error';
                    statusMessage.innerHTML = '❌ Tidak ada angka terdeteksi. Silakan foto ulang!';
                    statusMessage.classList.remove('hidden');
                    
                    // Enable retake button aja
                    btnRetake.style.display = 'block';
                }
                
            } catch (error) {
                console.error('OCR Error:', error);
                loadingIndicator.classList.add('hidden');
                
                statusMessage.className = 'status-badge status-error';
                statusMessage.innerHTML = '❌ Gagal memproses foto. Silakan coba lagi!';
                statusMessage.classList.remove('hidden');
                
                btnRetake.style.display = 'block';
            }
        }

        // ==================== KONFIRMASI ====================
        document.getElementById('btnConfirmYes').addEventListener('click', function() {
            isConfirmed = true;
            confirmationBox.classList.add('hidden');
            submitBtn.disabled = false;
            
            statusMessage.className = 'status-badge status-success';
            statusMessage.innerHTML = '✅ Data siap disubmit!';
            statusMessage.classList.remove('hidden');
        });

        document.getElementById('btnConfirmNo').addEventListener('click', function() {
            // Trigger retake
            btnRetake.click();
        });

        // ==================== SUBMIT FORM ====================
        document.getElementById('airQualityForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Validasi
            if (!capturedPhoto) {
                alert('Harap ambil foto terlebih dahulu!');
                return;
            }
            
            if (!detectedNumbers || detectedNumbers === 'Tidak terdeteksi') {
                alert('Harap pastikan foto bisa diproses!');
                return;
            }
            
            if (!isConfirmed) {
                alert('Harap konfirmasi hasil deteksi!');
                return;
            }
            
            const roomNumber = document.getElementById('roomNumber').value;
            const itemName = document.getElementById('itemName').value;
            
            if (!roomNumber || !itemName) {
                alert('Harap pilih ruangan dan jenis alat!');
                return;
            }
            
            // Buat record baru
            const record = {
                id: Date.now(),
                roomNumber: roomNumber,
                itemName: itemName,
                detectedValue: detectedNumbers,
                photo: capturedPhoto,  // FIX: pake capturedPhoto, bukan currentPhotoData
                timestamp: new Date().toLocaleString('id-ID')
            };
            
            // Simpan ke array dan localStorage
            records.unshift(record);
            localStorage.setItem('airQualityRecords', JSON.stringify(records));
            
            // Update tampilan
            displayRecords();
            
            // Reset form
            document.getElementById('airQualityForm').reset();
            btnRetake.click(); // Trigger reset camera section
            
            alert('✅ Data berhasil disimpan!');
        });

        // ==================== CLEAR ALL ====================
        document.getElementById('clearAll').addEventListener('click', function() {
            if (confirm('Yakin hapus semua riwayat?')) {
                records = [];
                localStorage.removeItem('airQualityRecords');
                displayRecords();
            }
        });

        // Initial display
        displayRecords();
    </script>
</body>
</html>
