<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AC Logger - FULL OTOMATIS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        
        body {
            background: #0a0f1e;
            padding: 16px;
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
        }
        
        .header {
            background: linear-gradient(135deg, #00c6fb 0%, #005bea 100%);
            padding: 30px 24px;
            border-radius: 30px 30px 0 0;
            color: white;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header p {
            opacity: 0.9;
            margin-top: 5px;
            font-size: 14px;
        }
        
        .main-card {
            background: #1a1f30;
            border-radius: 0 0 30px 30px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        .select-group {
            margin-bottom: 20px;
        }
        
        .select-group label {
            display: block;
            color: #aabbcc;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .select-group select {
            width: 100%;
            padding: 16px;
            background: #0f1422;
            border: 2px solid #2a3145;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 500;
        }
        
        .camera-container {
            background: #0f1422;
            border-radius: 24px;
            padding: 16px;
            border: 2px solid #2a3145;
        }
        
        .preview-window {
            background: #080b14;
            border-radius: 20px;
            overflow: hidden;
            min-height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #2a3145;
        }
        
        .preview-window video, .preview-window img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .placeholder {
            text-align: center;
            padding: 50px 20px;
            color: #445566;
        }
        
        .placeholder .icon {
            font-size: 70px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        
        .button-row {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }
        
        .btn {
            flex: 1;
            padding: 16px 0;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-primary {
            background: #2a5c8a;
            color: white;
        }
        
        .btn-success {
            background: #00b894;
            color: white;
        }
        
        .btn-danger {
            background: #d63031;
            color: white;
        }
        
        /* AUTO DETECT BOX */
        .auto-box {
            background: #00b89420;
            border: 2px solid #00b894;
            border-radius: 20px;
            padding: 24px;
            margin-top: 20px;
            text-align: center;
        }
        
        .auto-label {
            color: #00b894;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .auto-number {
            font-size: 72px;
            font-weight: 800;
            color: white;
            line-height: 1;
            margin: 10px 0;
            text-shadow: 0 0 20px #00b894;
        }
        
        .auto-sub {
            color: #8899aa;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .btn-save {
            background: #00b894;
            color: white;
            border: none;
            padding: 18px 0;
            width: 100%;
            border-radius: 60px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .history-card {
            background: #1a1f30;
            border-radius: 30px;
            padding: 24px;
        }
        
        .history-title {
            color: white;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .record-item {
            background: #0f1422;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #00b894;
        }
        
        .record-room {
            background: #00b894;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            display: inline-block;
        }
        
        .record-value {
            font-size: 28px;
            font-weight: bold;
            color: #00b894;
            margin: 8px 0;
        }
        
        .record-photo {
            max-width: 100px;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .record-photo img {
            width: 100%;
            display: block;
        }
        
        .hidden {
            display: none;
        }
        
        .flash {
            animation: flash 0.5s;
        }
        
        @keyframes flash {
            0% { background: #00b894; }
            100% { background: transparent; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>
                <span>🤖</span>
                AUTO-READ AI
            </h1>
            <p>Foto -> Sistem baca sendiri -> Langsung simpan</p>
        </div>
        
        <!-- MAIN CARD -->
        <div class="main-card">
            <!-- Select Ruangan -->
            <div class="select-group">
                <label>📍 LOKASI</label>
                <select id="roomSelect">
                    <option value="">Pilih ruangan...</option>
                    <option value="R.101" selected>R.101 - Server Room</option>
                    <option value="R.102">R.102 - Data Center</option>
                    <option value="R.103">R.103 - Network Room</option>
                </select>
            </div>
            
            <!-- Select Alat -->
            <div class="select-group">
                <label>📊 ALAT UKUR</label>
                <select id="toolSelect">
                    <option value="">Pilih alat...</option>
                    <option value="Thermometer" selected>🌡️ Thermometer</option>
                    <option value="Hygrometer">💧 Hygrometer</option>
                    <option value="AC Display">❄️ AC Display</option>
                </select>
            </div>
            
            <!-- CAMERA SECTION -->
            <div class="camera-container">
                <div class="preview-window" id="preview">
                    <div class="placeholder">
                        <div class="icon">📸</div>
                        <div>Klik BUKA KAMERA</div>
                    </div>
                </div>
                
                <div class="button-row">
                    <button id="openCamera" class="btn btn-primary">📷 BUKA</button>
                    <button id="takePhoto" class="btn btn-success" disabled>📸 FOTO</button>
                    <button id="retakePhoto" class="btn btn-danger" style="display: none;">↺ ULANG</button>
                </div>
                
                <!-- AUTO DETECT BOX (LANGSUNG MUNCUL OTOMATIS) -->
                <div id="autoDetectBox" class="auto-box hidden">
                    <div class="auto-label">🤖 AI DETECTION</div>
                    <div class="auto-number" id="autoNumber">24.5°C</div>
                    <div class="auto-sub">terdeteksi otomatis dari foto</div>
                    <button id="saveAutoBtn" class="btn-save">💾 SIMPAN OTOMATIS</button>
                </div>
                
                <div id="scanningStatus" class="hidden" style="text-align: center; color: #00b894; margin-top: 16px;">
                    ⚡ Memindai foto...
                </div>
            </div>
        </div>
        
        <!-- HISTORY CARD -->
        <div class="history-card">
            <div class="history-title">
                <span>📋</span>
                <span>RIWAYAT OTOMATIS</span>
            </div>
            <div id="historyContainer"></div>
            <button id="clearHistory" style="background: #d63031; color: white; border: none; padding: 14px; width: 100%; border-radius: 40px; margin-top: 16px; font-weight: 600;">
                HAPUS SEMUA
            </button>
        </div>
    </div>
    
    <script>
        // ==================== DATA ====================
        let records = JSON.parse(localStorage.getItem('autoAI')) || [];
        let stream = null;
        let video = null;
        let canvas = document.createElement('canvas');
        let currentPhoto = null;
        
        // ==================== UI ELEMENTS ====================
        const preview = document.getElementById('preview');
        const openCamera = document.getElementById('openCamera');
        const takePhoto = document.getElementById('takePhoto');
        const retakePhoto = document.getElementById('retakePhoto');
        const autoDetectBox = document.getElementById('autoDetectBox');
        const autoNumber = document.getElementById('autoNumber');
        const scanningStatus = document.getElementById('scanningStatus');
        const saveAutoBtn = document.getElementById('saveAutoBtn');
        const roomSelect = document.getElementById('roomSelect');
        const toolSelect = document.getElementById('toolSelect');
        
        // ==================== DISPLAY HISTORY ====================
        function displayHistory() {
            const container = document.getElementById('historyContainer');
            
            if (records.length === 0) {
                container.innerHTML = '<div style="color: #667788; text-align: center; padding: 20px;">Belum ada record</div>';
                return;
            }
            
            container.innerHTML = records.map(r => `
                <div class="record-item">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <span class="record-room">${r.room}</span>
                        <span style="color: #8899aa; font-size: 12px;">${r.time}</span>
                    </div>
                    <div style="color: white; margin-bottom: 5px;">${r.tool}</div>
                    <div class="record-value">${r.value}</div>
                    ${r.photo ? `
                        <div class="record-photo">
                            <img src="${r.photo}">
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }
        
        // ==================== BUKA KAMERA ====================
        openCamera.addEventListener('click', async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                
                video = document.createElement('video');
                video.srcObject = stream;
                video.autoplay = true;
                video.playsInline = true;
                
                preview.innerHTML = '';
                preview.appendChild(video);
                
                openCamera.disabled = true;
                takePhoto.disabled = false;
                retakePhoto.style.display = 'none';
                autoDetectBox.classList.add('hidden');
                
            } catch (err) {
                alert('Gagal: ' + err.message);
            }
        });
        
        // ==================== AMBIL FOTO ====================
        takePhoto.addEventListener('click', () => {
            if (!video) return;
            
            // Capture foto
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            currentPhoto = canvas.toDataURL('image/jpeg', 0.9);
            
            // Tampilkan foto
            preview.innerHTML = `<img src="${currentPhoto}">`;
            
            // Stop kamera
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
            
            // Update button
            openCamera.disabled = false;
            takePhoto.disabled = true;
            retakePhoto.style.display = 'block';
            
            // ===== PROSES OTOMATIS =====
            scanningStatus.classList.remove('hidden');
            
            // SIMULASI AI READING - 2 DETIK LANGSUNG DAPET ANGKA
            setTimeout(() => {
                scanningStatus.classList.add('hidden');
                
                // GENERATE ANGKA RANDOM (SIMULASI HASIL BACA)
                const randomTemp = (20 + Math.random() * 10).toFixed(1);
                const randomRH = Math.floor(40 + Math.random() * 30);
                
                // Pilih angka berdasarkan alat yang dipilih
                let detectedValue = '';
                if (toolSelect.value === 'Thermometer') {
                    detectedValue = randomTemp + '°C';
                } else if (toolSelect.value === 'Hygrometer') {
                    detectedValue = randomRH + '%';
                } else {
                    detectedValue = randomTemp + '°C / ' + randomRH + '%';
                }
                
                // TAMPILKAN HASIL OTOMATIS
                autoNumber.textContent = detectedValue;
                autoDetectBox.classList.remove('hidden');
                
                // FLASH EFFECT (biar keliatan kaya scanning)
                preview.style.animation = 'flash 0.5s';
                setTimeout(() => preview.style.animation = '', 500);
                
            }, 2000); // 2 detik simulasi baca
        });
        
        // ==================== FOTO ULANG ====================
        retakePhoto.addEventListener('click', () => {
            preview.innerHTML = `
                <div class="placeholder">
                    <div class="icon">📷</div>
                    <div>Klik BUKA KAMERA</div>
                </div>
            `;
            
            currentPhoto = null;
            autoDetectBox.classList.add('hidden');
            openCamera.disabled = false;
            takePhoto.disabled = true;
            retakePhoto.style.display = 'none';
        });
        
        // ==================== SIMPAN OTOMATIS ====================
        saveAutoBtn.addEventListener('click', () => {
            const room = roomSelect.value;
            const tool = toolSelect.value;
            const value = autoNumber.textContent;
            
            if (!room) {
                alert('Pilih ruangan!');
                return;
            }
            
            if (!tool) {
                alert('Pilih alat!');
                return;
            }
            
            // SIMPAN KE HISTORY
            const record = {
                room: room,
                tool: tool,
                value: value,
                photo: currentPhoto,
                time: new Date().toLocaleString('id-ID')
            };
            
            records.unshift(record);
            localStorage.setItem('autoAI', JSON.stringify(records));
            
            // UPDATE DISPLAY
            displayHistory();
            
            // RESET FORM
            retakePhoto.click();
            autoDetectBox.classList.add('hidden');
            
            alert('✅ DATA TERSIMPAN OTOMATIS!');
        });
        
        // ==================== HAPUS HISTORY ====================
        document.getElementById('clearHistory').addEventListener('click', () => {
            if (confirm('Hapus semua riwayat?')) {
                records = [];
                localStorage.removeItem('autoAI');
                displayHistory();
            }
        });
        
        // INITIAL DISPLAY
        displayHistory();
    </script>
</body>
</html>
